<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Kelas XIF7 Eksklusif</title>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #f4f7f9;
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --primary-grad: linear-gradient(135deg, #0ea5e9, #3b82f6, #8b5cf6);
            --neon-cyan: #0ea5e9;
            --neon-pink: #ec4899;
            --border-light: rgba(226, 232, 240, 0.8);
            
            --font-heading: 'Outfit', sans-serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(14, 165, 233, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(236, 72, 153, 0.1) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main);
            font-family: var(--font-body);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        /* --- CONTAINER KACA (GLASSMORPHISM) --- */
        .app-container {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            width: 100%;
            max-width: 460px;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08), 0 0 40px rgba(14, 165, 233, 0.15);
            overflow: hidden;
            padding: 40px 30px;
            position: relative;
            margin-top: 15px;
            margin-bottom: 30px;
        }

        /* Border Glow Dinamis di atas Container */
        .app-container::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
            background: var(--primary-grad);
            background-size: 200% auto;
            animation: gradientMove 4s linear infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        header { text-align: center; margin-bottom: 30px; }

        h1 { 
            font-family: var(--font-heading);
            font-size: 32px; 
            font-weight: 800;
            background: var(--primary-grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
            margin-bottom: 5px;
        }
        
        h2 { font-family: var(--font-heading); font-size: 24px; font-weight: 700; text-align: center; color: var(--text-main);}
        p { text-align: center; color: var(--text-muted); font-size: 14px; margin-bottom: 30px; font-weight: 500;}

        /* --- TRANSISI PANEL --- */
        .panel { 
            display: none; opacity: 0;
            transform: scale(0.97) translateY(15px);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .panel.active { display: block; opacity: 1; transform: scale(1) translateY(0); }

        /* --- TOMBOL ELEGAN --- */
        button {
            font-family: var(--font-body);
            width: 100%; padding: 16px; border: none; border-radius: 16px;
            font-size: 15px; font-weight: 700; cursor: pointer;
            margin-bottom: 16px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 0.3px;
        }
        button:active { transform: scale(0.96); }

        .btn-primary { 
            background: var(--primary-grad); color: white; 
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.4); 
            background-size: 200% auto;
        }
        .btn-primary:hover { 
            box-shadow: 0 15px 35px -5px rgba(59, 130, 246, 0.5); 
            transform: translateY(-2px);
            background-position: right center;
        }

        .btn-secondary { 
            background: rgba(255, 255, 255, 0.6); color: var(--text-main); 
            border: 1.5px solid var(--border-light); backdrop-filter: blur(10px);
        }
        .btn-secondary:hover { border-color: var(--neon-cyan); color: var(--neon-cyan); background: #fff;}
        
        .btn-text { background: transparent; color: var(--text-muted); padding: 5px; font-size: 14px; box-shadow: none;}
        .btn-text:hover { color: var(--text-main); }

        /* --- FORM & INPUT --- */
        .form-group { margin-bottom: 24px; }
        .form-group label { 
            display: block; font-size: 13px; font-weight: 700; 
            margin-bottom: 10px; color: var(--text-main);
            text-transform: uppercase; letter-spacing: 0.5px;
        }

        .input-field, .custom-select-btn {
            font-family: var(--font-body);
            width: 100%; padding: 16px 18px; border: 1.5px solid var(--border-light);
            background: #ffffff; border-radius: 16px; font-size: 14px;
            outline: none; transition: all 0.3s ease; font-weight: 500;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }
        .input-field:focus { 
            border-color: var(--neon-cyan); 
            box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.15); 
        }
        
        .custom-select-btn { display: flex; justify-content: space-between; align-items: center; cursor: pointer; color: var(--text-muted); }
        .custom-select-btn:hover { border-color: #cbd5e1; }
        .custom-select-btn.selected { color: var(--text-main); font-weight: 700; border-color: var(--neon-cyan); }

        /* --- LIST NAMA --- */
        .search-box { margin-bottom: 15px; }
        .name-list {
            max-height: 200px; overflow-y: auto; border: 1.5px solid var(--border-light);
            border-radius: 16px; background: #ffffff; 
        }
        .name-list::-webkit-scrollbar { width: 6px; }
        .name-list::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .name-item {
            padding: 15px 18px; cursor: pointer; border-bottom: 1px solid var(--border-light);
            font-size: 14px; font-weight: 600; transition: all 0.2s; position: relative; color: #475569;
        }
        .name-item:last-child { border-bottom: none; }
        .name-item:hover:not(.disabled) { background: #f8fafc; color: var(--neon-cyan); padding-left: 22px;}
        
        .name-item.terpilih {
            background: rgba(14, 165, 233, 0.08); color: var(--neon-cyan);
            font-weight: 700; padding-left: 24px; border-color: transparent;
        }
        .name-item.terpilih::before {
            content: ''; position: absolute; left: 0; top: 10%; bottom: 10%; width: 4px;
            background: var(--neon-cyan); border-radius: 0 6px 6px 0;
        }

        .name-item.disabled { background-color: #f1f5f9; color: #94a3b8; cursor: not-allowed; pointer-events: none; }

        /* --- RADIO BUTTON STATUS --- */
        .radio-group { display: flex; gap: 15px; }
        .radio-btn { 
            flex: 1; text-align: center; padding: 16px; border: 1.5px solid var(--border-light); 
            background: #ffffff; border-radius: 16px; cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); font-weight: 700; font-size: 14px;
            color: var(--text-muted); box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }
        .radio-btn input { display: none; }
        .radio-btn.active-hadir { 
            border-color: var(--neon-cyan); background: rgba(14, 165, 233, 0.05); color: var(--neon-cyan);
            box-shadow: 0 10px 20px -5px rgba(14, 165, 233, 0.2); transform: translateY(-2px);
        }
        .radio-btn.active-izin { 
            border-color: var(--neon-pink); background: rgba(236, 72, 153, 0.05); color: var(--neon-pink);
            box-shadow: 0 10px 20px -5px rgba(236, 72, 153, 0.2); transform: translateY(-2px);
        }

        /* --- KAMERA (MEMPERBAIKI MIRROR) --- */
        #area-dinamis { transition: all 0.4s ease; overflow: hidden; }
        .camera-wrapper {
            width: 100%; border-radius: 20px; overflow: hidden; background: #0f172a;
            margin-bottom: 15px; position: relative; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        
        /* PENTING: Hanya video yang di-mirror oleh CSS. Canvas TIDAK BOLEH di-mirror CSS lagi */
        #video-kamera { 
            width: 100%; display: block; border-radius: 20px; 
            transform: scaleX(-1); 
            -webkit-transform: scaleX(-1);
        }
        #canvas-kamera { 
            width: 100%; display: block; border-radius: 20px; 
            transform: none !important; /* Mencegah double mirror */
        } 
        
        .hidden { display: none !important; }

        /* --- MODAL BAWAH (BOTTOM SHEET) --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(8px);
            display: flex; justify-content: center; align-items: flex-end;
            opacity: 0; visibility: hidden; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); z-index: 1000;
        }
        .modal-overlay.show { opacity: 1; visibility: visible; }
        .modal-content {
            background: #ffffff; width: 100%; max-width: 460px;
            border-radius: 32px 32px 0 0; padding: 35px 30px;
            transform: translateY(100%); transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            max-height: 85vh; overflow-y: auto; box-shadow: 0 -20px 40px rgba(0,0,0,0.1);
        }
        .modal-overlay.show .modal-content { transform: translateY(0); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;}
        .modal-header h3 { font-family: var(--font-heading); font-size: 20px; font-weight: 700; color: var(--text-main); }
        .close-btn { 
            background: #f1f5f9; width: 40px; height: 40px; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; cursor: pointer; 
            border: none; transition: 0.2s; color: var(--text-muted); font-size: 16px;
        }
        .close-btn:hover { background: #e2e8f0; color: var(--text-main); transform: scale(1.05);}
        
        .modal-item {
            padding: 18px; border: 1.5px solid var(--border-light); border-radius: 16px;
            margin-bottom: 12px; cursor: pointer; font-weight: 600; text-align: center; 
            background: #fff; color: var(--text-main); transition: all 0.2s;
        }
        .modal-item:active { transform: scale(0.97); }
        .modal-item:hover { 
            border-color: var(--neon-cyan); background: rgba(14, 165, 233, 0.05); 
            color: var(--neon-cyan); box-shadow: 0 4px 12px rgba(14, 165, 233, 0.1);
        }

    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <h1>XIF7 ABSENTIA</h1>
        </header>

        <div id="panel-awal" class="panel active">
            <h2>Portal Kehadiran</h2>
            <p>Sistem Absensi Digital Eksklusif</p>
            <button class="btn-primary" onclick="switchPanel('panel-absen')">Mulai Absensi Wajah</button>
            <button class="btn-secondary" onclick="switchPanel('panel-pengelola')">Akses Pengelola</button>
        </div>

        <div id="panel-pengelola" class="panel">
            <h2>Panel Admin</h2>
            <p>Masukkan kredensial keamanan</p>
            <input type="text" placeholder="Username / ID" class="input-field" style="margin-bottom: 16px;">
            <input type="password" placeholder="Password Security" class="input-field" style="margin-bottom: 24px;">
            <button class="btn-primary" onclick="Swal.fire('Terhubung', 'Sistem pengelola dalam pengembangan. Belum terhubung ke Database.', 'info')">Otorisasi Masuk</button>
            <button class="btn-text" onclick="switchPanel('panel-awal')">Kembali ke Beranda</button>
        </div>

        <div id="panel-absen" class="panel">
            <h2>Form Kehadiran</h2>
            <p style="margin-bottom: 25px;">Lengkapi data dengan teliti</p>
            
            <div class="form-group">
                <label>Hari Absensi</label>
                <input type="hidden" id="hari" value="">
                <div class="custom-select-btn" id="btn-pilih-hari" onclick="openModal('modal-hari')">
                    <span id="teks-hari">Pilih hari kehadiran...</span> <span style="font-size: 12px;">▼</span>
                </div>
            </div>

            <div class="form-group">
                <label>Mata Pelajaran</label>
                <input type="hidden" id="mapel" value="">
                <div class="custom-select-btn" id="btn-pilih-mapel" onclick="bukaModalMapel()">
                    <span id="teks-mapel">Pilih mata pelajaran...</span> <span style="font-size: 12px;">▼</span>
                </div>
            </div>

            <div class="form-group">
                <label>Identitas Siswa</label>
                <input type="text" id="search-nama" class="input-field search-box" placeholder="🔍 Ketik nama kamu..." oninput="filterNama()">
                <div id="list-nama" class="name-list"></div>
                <input type="hidden" id="nama-terpilih" value="">
            </div>

            <div class="form-group">
                <label>Deklarasi Kehadiran</label>
                <div class="radio-group">
                    <label class="radio-btn" id="label-hadir">
                        <input type="radio" name="status" value="Hadir" onchange="ubahStatus('Hadir')"> HADIR
                    </label>
                    <label class="radio-btn" id="label-izin">
                        <input type="radio" name="status" value="Izin" onchange="ubahStatus('Izin')"> IZIN
                    </label>
                </div>
            </div>

            <div id="area-dinamis" class="hidden">
                <div id="area-kamera" class="hidden">
                    <label>Verifikasi Biometrik Wajah</label>
                    <div class="camera-wrapper">
                        <video id="video-kamera" autoplay playsinline></video>
                        <canvas id="canvas-kamera" class="hidden"></canvas>
                    </div>
                    <button class="btn-primary" id="btn-capture" onclick="takeSnapshot()">Ambil Foto Selfie</button>
                    <button class="btn-secondary hidden" id="btn-retake" onclick="retakePhoto()">Ulangi Pengambilan</button>
                    <input type="hidden" id="foto-data" value="">
                </div>

                <div id="area-izin" class="hidden">
                    <label>Keterangan Absen (Izin/Sakit)</label>
                    <textarea id="keterangan-izin" class="input-field" rows="3" placeholder="Sertakan alasan yang jelas (Min. 5 huruf)..."></textarea>
                </div>
            </div>

            <br>
            <button class="btn-primary" onclick="kirimAbsen()" style="margin-top: 10px;">Kirim Data Kehadiran</button>
            <button class="btn-text" onclick="switchPanel('panel-awal')">Batalkan Proses</button>
        </div>
    </div>

    <div id="modal-hari" class="modal-overlay" onclick="closeModal('modal-hari')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3>Jadwal Hari Ini</h3>
                <button class="close-btn" onclick="closeModal('modal-hari')">✕</button>
            </div>
            <div id="list-hari-container">
                <div class="modal-item" onclick="pilihHari('Senin')">Senin</div>
                <div class="modal-item" onclick="pilihHari('Selasa')">Selasa</div>
                <div class="modal-item" onclick="pilihHari('Rabu')">Rabu</div>
                <div class="modal-item" onclick="pilihHari('Kamis')">Kamis</div>
                <div class="modal-item" onclick="pilihHari('Jumat')">Jumat</div>
            </div>
        </div>
    </div>

    <div id="modal-mapel" class="modal-overlay" onclick="closeModal('modal-mapel')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3>Daftar Pelajaran</h3>
                <button class="close-btn" onclick="closeModal('modal-mapel')">✕</button>
            </div>
            <div id="list-mapel-container"></div>
        </div>
    </div>

    <script>
        // --- DATA ---
        const jadwalPelajaran = {
            "Senin": ["PKWU (07.10 - 08.30)", "BIOLOGI (08.30 - 09.50)", "BAHASA SUNDA (10.10 - 11.30)", "MATEMATIKA (11.30 - 13.40)", "BAHASA INDONESIA (13.40 - 15.00)"],
            "Selasa": ["SEJARAH (06.30 - 08.00)", "PJOK (08.00 - 10.30)", "EKONOMI (10.30 - 13.30)", "MATEMATIKA (13.30 - 15.00)"],
            "Rabu": ["SENI BUDAYA (06.30 - 08.00)", "FISIKA (08.00 - 09.30)", "BAHASA INGGRIS (09.45 - 12.00)", "INFORMATIKA (12.45 - 15.00)"],
            "Kamis": ["BIOLOGI (07.10 - 09.10)", "PKN (09.10 - 10.50)", "BAHASA INDONESIA (10.50 - 12.10)", "PAI (13.00 - 15.00)"],
            "Jumat": ["INFORMATIKA (06.45 - 08.05)", "EKONOMI (08.05 - 09.25)", "FISIKA (09.45 - 11.50)"]
        };

        const daftarNama = [
            "AHMAD EKA R", "AISY HALAWAH", "ALYA ZALIANTI Z", "ANI MULYANI", "ANISA NUR A", 
            "DENNIS SEPTIANO", "DITA BELLA A", "EZRA FAIQ", "HABLY ALFATIHIN", "IFTITA ARIQOH", 
            "IIM QORIMAH", "JA'FAR SODIQ", "KAMILAH NURIL HS", "KESYA EKA ASTALITA", "KEYLA EDDYA W", 
            "MARWAH", "MUHAMMAD LUTHFI", "MUH RIZKY N", "MYISHA FARRAS A", "NABIL DARUL FARIS", 
            "NANANG SUMANTRI", "NAZWA AULIA", "NURUL FATIN A", "NURUL FIKRIYAH ZAK", "PUTRA DANU W", 
            "QUINAISHA LAILA K", "REVAND Z LP", "SATRIO NADA", "SELPIA NOVITA SARI", "SITI MAESAROH", 
            "SITI NURI MAULIDYA", "SURYA AJI SAPUTRA", "SYAFIRA SULISTIANTI", "SYAHLAA BAITI", 
            "TRI SETYO NINGRUM", "ULVIANA K", "ZELKHA SAID", "NUR HAFIZHOH"
        ];

        let stateNamaTerpilih = "";

        // --- NAVIGASI MULUS ---
        function switchPanel(panelId) {
            const currentActive = document.querySelector('.panel.active');
            if(currentActive) {
                currentActive.style.opacity = 0;
                currentActive.style.transform = 'scale(0.97) translateY(15px)';
                setTimeout(() => {
                    currentActive.classList.remove('active');
                    const nextPanel = document.getElementById(panelId);
                    nextPanel.classList.add('active');
                    void nextPanel.offsetWidth;
                    nextPanel.style.opacity = 1;
                    nextPanel.style.transform = 'scale(1) translateY(0)';
                }, 400);
            }
            if(panelId === 'panel-awal') matikanKamera(); 
        }

        function openModal(id) { document.getElementById(id).classList.add('show'); }
        function closeModal(id) { document.getElementById(id).classList.remove('show'); }

        function pilihHari(hari) {
            document.getElementById('hari').value = hari;
            document.getElementById('teks-hari').innerText = hari;
            document.getElementById('btn-pilih-hari').classList.add('selected');
            
            document.getElementById('mapel').value = "";
            document.getElementById('teks-mapel').innerText = "Pilih mata pelajaran...";
            document.getElementById('btn-pilih-mapel').classList.remove('selected');

            stateNamaTerpilih = ""; document.getElementById('nama-terpilih').value = "";

            closeModal('modal-hari');
            generateListMapel(hari);
            renderNama(document.getElementById('search-nama').value);
        }

        function bukaModalMapel() {
            if(!document.getElementById('hari').value) {
                Swal.fire({icon: 'warning', title: 'Data Kurang', text: 'Silakan pilih jadwal hari terlebih dahulu.', confirmButtonColor: '#0ea5e9', confirmButtonText: 'Mengerti'});
                return;
            }
            openModal('modal-mapel');
        }

        function generateListMapel(hari) {
            const container = document.getElementById('list-mapel-container');
            container.innerHTML = "";
            if(jadwalPelajaran[hari]) {
                jadwalPelajaran[hari].forEach(mapel => {
                    let div = document.createElement('div');
                    div.className = 'modal-item'; div.innerText = mapel;
                    div.onclick = () => pilihMapel(mapel);
                    container.appendChild(div);
                });
            }
        }

        function pilihMapel(mapel) {
            document.getElementById('mapel').value = mapel;
            document.getElementById('teks-mapel').innerText = mapel;
            document.getElementById('btn-pilih-mapel').classList.add('selected');
            
            stateNamaTerpilih = ""; document.getElementById('nama-terpilih').value = "";
            
            closeModal('modal-mapel');
            renderNama(document.getElementById('search-nama').value);
        }

        // --- RENDER NAMA & CEK HISTORY ---
        function renderNama(filterText = "") {
            const listContainer = document.getElementById('list-nama');
            const hari = document.getElementById('hari').value;
            const mapel = document.getElementById('mapel').value;
            
            listContainer.innerHTML = "";
            const filtered = daftarNama.filter(nama => nama.toLowerCase().includes(filterText.toLowerCase()));
            
            filtered.forEach(nama => {
                let div = document.createElement('div'); div.className = 'name-item';
                
                const cekAbsenKunci = `absen_XIF7_${nama}_${hari}_${mapel}`;
                const sudahAbsen = (hari && mapel && localStorage.getItem(cekAbsenKunci));

                if (sudahAbsen) {
                    div.innerHTML = `${nama} <span style="float:right; color:#10b981; font-weight:700;">✓ Tercatat</span>`;
                    div.classList.add('disabled');
                } else {
                    div.innerText = nama;
                    if(nama === stateNamaTerpilih) div.classList.add('terpilih');

                    div.onclick = () => {
                        stateNamaTerpilih = nama;
                        document.getElementById('nama-terpilih').value = nama;
                        renderNama(document.getElementById('search-nama').value);
                    };
                }
                listContainer.appendChild(div);
            });
        }
        renderNama(); 

        function filterNama() { renderNama(document.getElementById('search-nama').value); }

        // --- UI STATUS & KAMERA ---
        let streamKamera = null;

        function ubahStatus(status) {
            const areaDinamis = document.getElementById('area-dinamis');
            const areaKamera = document.getElementById('area-kamera');
            const areaIzin = document.getElementById('area-izin');
            const labelHadir = document.getElementById('label-hadir');
            const labelIzin = document.getElementById('label-izin');

            labelHadir.classList.remove('active-hadir'); labelIzin.classList.remove('active-izin');
            areaDinamis.classList.remove('hidden');

            if (status === 'Hadir') {
                labelHadir.classList.add('active-hadir');
                areaIzin.classList.add('hidden'); areaKamera.classList.remove('hidden');
                mulaiKamera();
            } else {
                labelIzin.classList.add('active-izin');
                areaKamera.classList.add('hidden'); areaIzin.classList.remove('hidden');
                matikanKamera();
            }
        }

        async function mulaiKamera() {
            const video = document.getElementById('video-kamera');
            try {
                streamKamera = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = streamKamera;
                document.getElementById('video-kamera').classList.remove('hidden');
                document.getElementById('canvas-kamera').classList.add('hidden');
                document.getElementById('btn-capture').classList.remove('hidden');
                document.getElementById('btn-retake').classList.add('hidden');
            } catch (err) {
                Swal.fire('Akses Ditolak', 'Izinkan browser menggunakan kamera untuk melakukan verifikasi wajah.', 'error');
            }
        }

        function matikanKamera() {
            if (streamKamera) streamKamera.getTracks().forEach(track => track.stop());
        }

        // --- PENGAMBILAN FOTO (MIRROR DIPERBAIKI) ---
        function takeSnapshot() {
            const video = document.getElementById('video-kamera');
            const canvas = document.getElementById('canvas-kamera');
            const context = canvas.getContext('2d');
            
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            
            // Kita flip di javascript agar gambar aslinya menjadi mirror
            context.translate(canvas.width, 0);
            context.scale(-1, 1);
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Simpan gambar base64 yang sudah dimirror
            document.getElementById('foto-data').value = canvas.toDataURL('image/png');
            
            // Karena canvas-kamera CSS transform-nya sudah dinonaktifkan (transform: none), 
            // gambar ini akan ditampilkan apa adanya (sudah mirrored sesuai preview HP).
            video.classList.add('hidden'); canvas.classList.remove('hidden');
            document.getElementById('btn-capture').classList.add('hidden');
            document.getElementById('btn-retake').classList.remove('hidden');
        }

        function retakePhoto() {
            document.getElementById('foto-data').value = "";
            document.getElementById('video-kamera').classList.remove('hidden');
            document.getElementById('canvas-kamera').classList.add('hidden');
            document.getElementById('btn-capture').classList.remove('hidden');
            document.getElementById('btn-retake').classList.add('hidden');
        }

        // --- PENGIRIMAN DATA ---
        function kirimAbsen() {
            const hari = document.getElementById('hari').value;
            const mapel = document.getElementById('mapel').value;
            const nama = document.getElementById('nama-terpilih').value;
            const statusEl = document.querySelector('input[name="status"]:checked');
            const status = statusEl ? statusEl.value : null;

            if (!hari || !mapel || !nama || !status) {
                Swal.fire({ title: 'Pendaftaran Gagal', text: 'Mohon lengkapi Jadwal, Nama, dan Deklarasi Kehadiran.', icon: 'warning', confirmButtonColor: '#ec4899', confirmButtonText: 'Periksa Kembali' });
                return;
            }

            let foto = ""; let keterangan = "";
            if (status === 'Hadir') {
                foto = document.getElementById('foto-data').value;
                if (!foto) { Swal.fire('Foto Diperlukan', 'Harap lakukan verifikasi foto wajah terlebih dahulu.', 'warning'); return; }
            } else if (status === 'Izin') {
                keterangan = document.getElementById('keterangan-izin').value.trim();
                if (keterangan.length < 5) { Swal.fire('Alasan Ditolak', 'Keterangan izin harus jelas dan lebih dari 5 huruf.', 'warning'); return; }
            }

            // SIMULASI PENGIRIMAN SUKSES
            Swal.fire({
                title: 'Data Diterima!', text: `Absensi ${nama} sukses diverifikasi.`,
                icon: 'success', confirmButtonColor: '#0ea5e9', confirmButtonText: 'Selesai'
            }).then(() => {
                const cekAbsenKunci = `absen_XIF7_${nama}_${hari}_${mapel}`;
                localStorage.setItem(cekAbsenKunci, 'true');
                
                document.getElementById('nama-terpilih').value = ""; stateNamaTerpilih = "";
                document.querySelector('input[name="status"]:checked').checked = false;
                document.getElementById('area-dinamis').classList.add('hidden');
                document.getElementById('label-hadir').classList.remove('active-hadir');
                document.getElementById('label-izin').classList.remove('active-izin');
                matikanKamera(); renderNama();
            });
        }
    </script>
</body>
</html>
