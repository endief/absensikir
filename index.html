<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Kelas XIF7 Premium</title>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

        :root {
            --bg-color: #fdfdfd;
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-main: #1a1a2e;
            --text-muted: #888888;
            --neon-cyan: #00e5ff;
            --neon-pink: #ff007a;
            --border-light: #e6e8ec;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent; 
        }

        /* Latar belakang diberi tekstur dot-grid futuristik namun tetap clean */
        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(#d5d5d5 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Container Utama dengan efek Glass & Glow neon halus */
        .app-container {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            width: 100%;
            max-width: 450px;
            border-radius: 24px;
            box-shadow: 0 15px 40px rgba(0, 229, 255, 0.08), 0 5px 15px rgba(255, 0, 122, 0.05);
            border: 1px solid rgba(0, 229, 255, 0.2);
            overflow: hidden;
            padding: 35px 30px;
            position: relative;
            margin-top: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-light);
            position: relative;
        }

        h1 { 
            font-size: 28px; 
            font-weight: 700;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
        }
        
        .panel { 
            display: none; 
            opacity: 0;
            transform: scale(0.96) translateY(10px);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .panel.active { 
            display: block; 
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        h2 { font-size: 22px; margin-bottom: 5px; text-align: center; font-weight: 600;}
        p { text-align: center; color: var(--text-muted); font-size: 14px; margin-bottom: 25px; }

        /* Tombol Mulus & Premium Glow */
        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 15px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        button:active { transform: scale(0.97); }

        .btn-primary { 
            background: linear-gradient(135deg, var(--neon-cyan), #0077ff); 
            color: white; 
            box-shadow: 0 8px 20px rgba(0, 229, 255, 0.25); 
        }
        .btn-primary:hover { 
            box-shadow: 0 10px 25px rgba(0, 229, 255, 0.4); 
            transform: translateY(-2px);
        }

        .btn-secondary { 
            background: #ffffff; 
            color: var(--text-main); 
            border: 2px solid var(--border-light);
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }
        .btn-secondary:hover { 
            border-color: var(--neon-pink); 
            color: var(--neon-pink); 
        }
        
        .btn-text { 
            background: transparent; 
            color: var(--text-muted); 
            padding: 5px; 
            margin-top: -5px; 
            font-size: 14px; 
            box-shadow: none;
        }
        .btn-text:hover { color: var(--text-main); }

        /* Form Inputs */
        .form-group { margin-bottom: 22px; }
        .form-group label { 
            display: block; 
            font-size: 13px; 
            font-weight: 600; 
            margin-bottom: 8px; 
            color: #444;
        }

        .input-field {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--border-light);
            background: #f9fbfd;
            border-radius: 14px;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }
        .input-field:focus { 
            border-color: var(--neon-cyan); 
            box-shadow: 0 0 0 4px rgba(0, 229, 255, 0.1);
            background: #ffffff;
        }

        /* Custom Dropdown Triggers */
        .custom-select-btn {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 15px;
            border: 2px solid var(--border-light);
            background: #f9fbfd;
            border-radius: 14px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--text-muted);
        }
        .custom-select-btn:hover { background: #ffffff; border-color: #d0d0d0; }
        .custom-select-btn:active { transform: scale(0.98); }
        .custom-select-btn.selected { 
            color: var(--text-main); 
            font-weight: 600; 
            border-color: var(--neon-cyan); 
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(0, 229, 255, 0.05);
        }

        /* Pencarian dan List Nama */
        .search-box { margin-bottom: 12px; }
        .name-list {
            max-height: 180px;
            overflow-y: auto;
            border: 1px solid var(--border-light);
            border-radius: 14px;
            background: #ffffff;
            scroll-behavior: smooth;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.02);
        }
        
        .name-list::-webkit-scrollbar { width: 6px; }
        .name-list::-webkit-scrollbar-thumb { background: #dcdcdc; border-radius: 10px; }
        
        .name-item {
            padding: 14px 16px;
            cursor: pointer;
            border-bottom: 1px solid var(--border-light);
            font-size: 14px;
            transition: all 0.2s ease;
            position: relative;
            color: #555;
        }
        .name-item:last-child { border-bottom: none; }
        .name-item:hover { background: rgba(0, 229, 255, 0.05); color: var(--text-main);}
        
        /* Highlight Nama Terpilih (Garis Neon) */
        .name-item.terpilih {
            background: rgba(0, 229, 255, 0.08);
            color: var(--text-main);
            font-weight: 600;
            padding-left: 22px;
        }
        .name-item.terpilih::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 5px;
            background: var(--neon-cyan);
            border-top-right-radius: 6px;
            border-bottom-right-radius: 6px;
            box-shadow: 2px 0 8px rgba(0, 229, 255, 0.5);
        }

        /* Radio Buttons Status */
        .radio-group { display: flex; gap: 15px; }
        .radio-btn { 
            flex: 1; text-align: center; padding: 14px; 
            border: 2px solid var(--border-light); 
            background: #f9fbfd;
            border-radius: 14px; cursor: pointer; 
            transition: all 0.3s ease;
            font-weight: 600;
            font-size: 14px;
            position: relative;
        }
        .radio-btn input { display: none; }
        .radio-btn.active-hadir { 
            border-color: var(--neon-cyan); 
            background: rgba(0, 229, 255, 0.08); 
            color: #0099aa;
            box-shadow: 0 5px 15px rgba(0,229,255,0.15);
        }
        .radio-btn.active-izin { 
            border-color: var(--neon-pink); 
            background: rgba(255, 0, 122, 0.08); 
            color: #cc0062;
            box-shadow: 0 5px 15px rgba(255,0,122,0.15);
        }

        /* Kamera Area */
        #area-dinamis { transition: all 0.4s ease; overflow: hidden; }
        .camera-wrapper {
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            background: #000;
            margin-bottom: 15px;
            position: relative;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        
        /* Memaksa video agar TIDAK MIRROR */
        #video-kamera, #canvas-kamera { 
            width: 100%; 
            display: block; 
            border-radius: 16px; 
            transform: scaleX(1) !important;
            -webkit-transform: scaleX(1) !important;
        } 
        
        .hidden { display: none !important; }

        /* MODAL PANEL (BOTTOM SHEET) */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            display: flex; justify-content: center; align-items: flex-end;
            opacity: 0; visibility: hidden;
            transition: all 0.3s ease;
            z-index: 1000;
        }
        .modal-overlay.show { opacity: 1; visibility: visible; }
        
        .modal-content {
            background: var(--bg-color);
            width: 100%; max-width: 450px;
            border-top-left-radius: 28px; border-top-right-radius: 28px;
            padding: 30px 25px;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 -15px 40px rgba(0,0,0,0.1);
            max-height: 85vh; overflow-y: auto;
        }
        .modal-overlay.show .modal-content { transform: translateY(0); }

        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;}
        .modal-header h3 { font-size: 18px; font-weight: 600; }
        .close-btn { 
            background: #f0f0f0; width: 36px; height: 36px; 
            border-radius: 50%; display: flex; justify-content: center; 
            align-items: center; cursor: pointer; padding: 0; margin: 0; 
            color: #555; border: none; transition: 0.2s;
        }
        .close-btn:hover { background: #e0e0e0; }
        
        .modal-item {
            padding: 16px;
            border: 2px solid var(--border-light);
            border-radius: 14px;
            margin-bottom: 12px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            text-align: center;
            background: #fff;
        }
        .modal-item:active { transform: scale(0.97); }
        .modal-item:hover { 
            border-color: var(--neon-cyan); 
            background: rgba(0,229,255,0.05); 
            color: #0099aa;
            font-weight: 600;
        }

    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <h1>XIF7 ABSENTIA</h1>
        </header>

        <div id="panel-awal" class="panel active">
            <h2>Portal Kehadiran</h2>
            <p>Sistem Absensi Digital Kelas XIF7</p>
            <button class="btn-primary" onclick="switchPanel('panel-absen')">📝 ABSEN SEKARANG</button>
            <button class="btn-secondary" onclick="switchPanel('panel-pengelola')">⚙️ PENGELOLA (ADMIN)</button>
        </div>

        <div id="panel-pengelola" class="panel">
            <h2>Akses Admin</h2>
            <p>Silakan masuk ke panel pengelola</p>
            <input type="text" placeholder="Username" class="input-field" style="margin-bottom: 15px;">
            <input type="password" placeholder="Password" class="input-field" style="margin-bottom: 25px;">
            <button class="btn-primary" onclick="Swal.fire('Restricted', 'Panel Admin belum terhubung ke database.', 'info')">LOGIN</button>
            <button class="btn-text" onclick="switchPanel('panel-awal')">Kembali</button>
        </div>

        <div id="panel-absen" class="panel">
            <h2>Formulir Kehadiran</h2>
            <p style="margin-bottom: 20px;">Isi data dengan teliti dan benar</p>
            
            <div class="form-group">
                <label>Pilih Jadwal Hari:</label>
                <input type="hidden" id="hari" value="">
                <div class="custom-select-btn" id="btn-pilih-hari" onclick="openModal('modal-hari')">
                    <span id="teks-hari">Pilih Hari...</span> <span>▼</span>
                </div>
            </div>

            <div class="form-group">
                <label>Pilih Mata Pelajaran:</label>
                <input type="hidden" id="mapel" value="">
                <div class="custom-select-btn" id="btn-pilih-mapel" onclick="bukaModalMapel()">
                    <span id="teks-mapel">Pilih Mata Pelajaran...</span> <span>▼</span>
                </div>
            </div>

            <div class="form-group">
                <label>Identitas Siswa:</label>
                <input type="text" id="search-nama" class="input-field search-box" placeholder="🔍 Cari nama kamu..." oninput="filterNama()">
                <div id="list-nama" class="name-list"></div>
                <input type="hidden" id="nama-terpilih" value="">
            </div>

            <div class="form-group">
                <label>Status Kehadiran:</label>
                <div class="radio-group">
                    <label class="radio-btn" id="label-hadir">
                        <input type="radio" name="status" value="Hadir" onchange="ubahStatus('Hadir')"> ✅ HADIR
                    </label>
                    <label class="radio-btn" id="label-izin">
                        <input type="radio" name="status" value="Izin" onchange="ubahStatus('Izin')"> ✉️ IZIN
                    </label>
                </div>
            </div>

            <div id="area-dinamis" class="hidden">
                <div id="area-kamera" class="hidden">
                    <label>Verifikasi Wajah (Selfie Asli, Tidak Mirror):</label>
                    <div class="camera-wrapper">
                        <video id="video-kamera" autoplay playsinline></video>
                        <canvas id="canvas-kamera" class="hidden"></canvas>
                    </div>
                    <button class="btn-primary" id="btn-capture" onclick="takeSnapshot()">📸 Jepret Foto</button>
                    <button class="btn-secondary hidden" id="btn-retake" onclick="retakePhoto()">🔄 Ulangi Foto</button>
                    <input type="hidden" id="foto-data" value="">
                </div>

                <div id="area-izin" class="hidden">
                    <label>Alasan Izin:</label>
                    <textarea id="keterangan-izin" class="input-field" rows="3" placeholder="Jelaskan alasan izin (Minimal 5 huruf)..."></textarea>
                </div>
            </div>

            <br>
            <button class="btn-primary" onclick="kirimAbsen()" style="box-shadow: 0 10px 25px rgba(255,0,122,0.3); background: linear-gradient(135deg, var(--neon-pink), #ff5e00);">🚀 KIRIM DATA ABSEN</button>
            <button class="btn-text" onclick="switchPanel('panel-awal')">Batalkan</button>
        </div>
    </div>

    <div id="modal-hari" class="modal-overlay" onclick="closeModal('modal-hari')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3>Pilih Hari</h3>
                <button class="close-btn" onclick="closeModal('modal-hari')">✕</button>
            </div>
            <div id="list-hari-container">
                <div class="modal-item" onclick="pilihHari('Senin')">Senin</div>
                <div class="modal-item" onclick="pilihHari('Selasa')">Selasa</div>
                <div class="modal-item" onclick="pilihHari('Rabu')">Rabu</div>
                <div class="modal-item" onclick="pilihHari('Kamis')">Kamis</div>
                <div class="modal-item" onclick="pilihHari('Jumat')">Jumat</div>
            </div>
        </div>
    </div>

    <div id="modal-mapel" class="modal-overlay" onclick="closeModal('modal-mapel')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3>Pilih Mata Pelajaran</h3>
                <button class="close-btn" onclick="closeModal('modal-mapel')">✕</button>
            </div>
            <div id="list-mapel-container">
                </div>
        </div>
    </div>

    <script>
        // --- 1. DATA JADWAL & NAMA ---
        const jadwalPelajaran = {
            "Senin": ["PKWU (07.10 - 08.30)", "BIOLOGI (08.30 - 09.50)", "BAHASA SUNDA (10.10 - 11.30)", "MATEMATIKA (11.30 - 13.40)", "BAHASA INDONESIA (13.40 - 15.00)"],
            "Selasa": ["SEJARAH (06.30 - 08.00)", "PJOK (08.00 - 10.30)", "EKONOMI (10.30 - 13.30)", "MATEMATIKA (13.30 - 15.00)"],
            "Rabu": ["SENI BUDAYA (06.30 - 08.00)", "FISIKA (08.00 - 09.30)", "BAHASA INGGRIS (09.45 - 12.00)", "INFORMATIKA (12.45 - 15.00)"],
            "Kamis": ["BIOLOGI (07.10 - 09.10)", "PKN (09.10 - 10.50)", "BAHASA INDONESIA (10.50 - 12.10)", "PAI (13.00 - 15.00)"],
            "Jumat": ["INFORMATIKA (06.45 - 08.05)", "EKONOMI (08.05 - 09.25)", "FISIKA (09.45 - 11.50)"]
        };

        const daftarNama = [
            "AHMAD EKA R", "AISY HALAWAH", "ALYA ZALIANTI Z", "ANI MULYANI", "ANISA NUR A", 
            "DENNIS SEPTIANO", "DITA BELLA A", "EZRA FAIQ", "HABLY ALFATIHIN", "IFTITA ARIQOH", 
            "IIM QORIMAH", "JA'FAR SODIQ", "KAMILAH NURIL HS", "KESYA EKA ASTALITA", "KEYLA EDDYA W", 
            "MARWAH", "MUHAMMAD LUTHFI", "MUH RIZKY N", "MYISHA FARRAS A", "NABIL DARUL FARIS", 
            "NANANG SUMANTRI", "NAZWA AULIA", "NURUL FATIN A", "NURUL FIKRIYAH ZAK", "PUTRA DANU W", 
            "QUINAISHA LAILA K", "REVAND Z LP", "SATRIO NADA", "SELPIA NOVITA SARI", "SITI MAESAROH", 
            "SITI NURI MAULIDYA", "SURYA AJI SAPUTRA", "SYAFIRA SULISTIANTI", "SYAHLAA BAITI", 
            "TRI SETYO NINGRUM", "ULVIANA K", "ZELKHA SAID", "NUR HAFIZHOH"
        ];

        let stateNamaTerpilih = "";

        // --- 2. NAVIGASI PANEL ---
        function switchPanel(panelId) {
            const currentActive = document.querySelector('.panel.active');
            if(currentActive) {
                currentActive.style.opacity = 0;
                currentActive.style.transform = 'scale(0.96) translateY(10px)';
                setTimeout(() => {
                    currentActive.classList.remove('active');
                    const nextPanel = document.getElementById(panelId);
                    nextPanel.classList.add('active');
                    void nextPanel.offsetWidth;
                    nextPanel.style.opacity = 1;
                    nextPanel.style.transform = 'scale(1) translateY(0)';
                }, 300);
            }
            if(panelId === 'panel-awal') matikanKamera(); 
        }

        // --- 3. MODAL HARI & MAPEL ---
        function openModal(id) { document.getElementById(id).classList.add('show'); }
        function closeModal(id) { document.getElementById(id).classList.remove('show'); }

        function pilihHari(hari) {
            document.getElementById('hari').value = hari;
            const btnHari = document.getElementById('btn-pilih-hari');
            document.getElementById('teks-hari').innerText = hari;
            btnHari.classList.add('selected');
            
            document.getElementById('mapel').value = "";
            document.getElementById('teks-mapel').innerText = "Pilih Mata Pelajaran...";
            document.getElementById('btn-pilih-mapel').classList.remove('selected');

            closeModal('modal-hari');
            generateListMapel(hari);
        }

        function bukaModalMapel() {
            const hari = document.getElementById('hari').value;
            if(!hari) {
                Swal.fire({icon: 'warning', title: 'Oops', text: 'Pilih hari terlebih dahulu!', confirmButtonColor: '#00e5ff'});
                return;
            }
            openModal('modal-mapel');
        }

        function generateListMapel(hari) {
            const container = document.getElementById('list-mapel-container');
            container.innerHTML = "";
            if(jadwalPelajaran[hari]) {
                jadwalPelajaran[hari].forEach(mapel => {
                    let div = document.createElement('div');
                    div.className = 'modal-item';
                    div.innerText = mapel;
                    div.onclick = () => pilihMapel(mapel);
                    container.appendChild(div);
                });
            }
        }

        function pilihMapel(mapel) {
            document.getElementById('mapel').value = mapel;
            document.getElementById('teks-mapel').innerText = mapel;
            document.getElementById('btn-pilih-mapel').classList.add('selected');
            closeModal('modal-mapel');
        }

        // --- 4. RENDER PENCARIAN NAMA ---
        const listContainer = document.getElementById('list-nama');
        function renderNama(filterText = "") {
            listContainer.innerHTML = "";
            const filtered = daftarNama.filter(nama => nama.toLowerCase().includes(filterText.toLowerCase()));
            
            filtered.forEach(nama => {
                let div = document.createElement('div');
                div.className = 'name-item';
                div.innerText = nama;
                
                if(nama === stateNamaTerpilih) {
                    div.classList.add('terpilih');
                }

                div.onclick = () => {
                    stateNamaTerpilih = nama;
                    document.getElementById('nama-terpilih').value = nama;
                    renderNama(document.getElementById('search-nama').value);
                };
                listContainer.appendChild(div);
            });
        }
        renderNama(); 

        function filterNama() {
            const text = document.getElementById('search-nama').value;
            renderNama(text);
        }

        // --- 5. LOGIKA UI STATUS & KAMERA ---
        let streamKamera = null;

        function ubahStatus(status) {
            const areaDinamis = document.getElementById('area-dinamis');
            const areaKamera = document.getElementById('area-kamera');
            const areaIzin = document.getElementById('area-izin');
            const labelHadir = document.getElementById('label-hadir');
            const labelIzin = document.getElementById('label-izin');

            labelHadir.classList.remove('active-hadir');
            labelIzin.classList.remove('active-izin');
            areaDinamis.classList.remove('hidden');

            if (status === 'Hadir') {
                labelHadir.classList.add('active-hadir');
                areaIzin.classList.add('hidden');
                areaKamera.classList.remove('hidden');
                mulaiKamera();
            } else {
                labelIzin.classList.add('active-izin');
                areaKamera.classList.add('hidden');
                areaIzin.classList.remove('hidden');
                matikanKamera();
            }
        }

        // KAMERA DIATUR AGAR TIDAK MIRROR & PAKAI KAMERA DEPAN
        async function mulaiKamera() {
            const video = document.getElementById('video-kamera');
            try {
                // facingMode: "user" memastikan kamera depan untuk HP
                streamKamera = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" } 
                });
                video.srcObject = streamKamera;
                document.getElementById('video-kamera').classList.remove('hidden');
                document.getElementById('canvas-kamera').classList.add('hidden');
                document.getElementById('btn-capture').classList.remove('hidden');
                document.getElementById('btn-retake').classList.add('hidden');
            } catch (err) {
                Swal.fire('Error', 'Gagal membuka kamera. Pastikan browser diizinkan mengakses kamera.', 'error');
            }
        }

        function matikanKamera() {
            if (streamKamera) {
                streamKamera.getTracks().forEach(track => track.stop());
            }
        }

        function takeSnapshot() {
            const video = document.getElementById('video-kamera');
            const canvas = document.getElementById('canvas-kamera');
            const context = canvas.getContext('2d');
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            document.getElementById('foto-data').value = canvas.toDataURL('image/png');
            
            video.classList.add('hidden');
            canvas.classList.remove('hidden');
            document.getElementById('btn-capture').classList.add('hidden');
            document.getElementById('btn-retake').classList.remove('hidden');
        }

        function retakePhoto() {
            document.getElementById('foto-data').value = "";
            document.getElementById('video-kamera').classList.remove('hidden');
            document.getElementById('canvas-kamera').classList.add('hidden');
            document.getElementById('btn-capture').classList.remove('hidden');
            document.getElementById('btn-retake').classList.add('hidden');
        }

        // --- 6. VALIDASI & PENGIRIMAN ---
        function kirimAbsen() {
            const hari = document.getElementById('hari').value;
            const mapel = document.getElementById('mapel').value;
            const nama = document.getElementById('nama-terpilih').value;
            const statusEl = document.querySelector('input[name="status"]:checked');
            const status = statusEl ? statusEl.value : null;

            if (!hari || !mapel || !nama || !status) {
                Swal.fire({
                    title: 'Data Belum Lengkap',
                    text: 'Pastikan Hari, Mapel, Nama, dan Status Kehadiran telah diisi.',
                    icon: 'warning',
                    confirmButtonColor: '#ff007a'
                });
                return;
            }

            // CEK DOUBLE ABSEN (Mencegah nama, hari, dan mapel yang sama diabsen ulang)
            const cekAbsenKunci = `absen_XIF7_${nama}_${hari}_${mapel}`;
            if (localStorage.getItem(cekAbsenKunci)) {
                Swal.fire({
                    title: 'Sudah Absen!',
                    text: `Siswa bernama ${nama} sudah melakukan absensi untuk pelajaran ${mapel} pada hari ${hari}.`,
                    icon: 'error',
                    confirmButtonColor: '#ff007a'
                });
                return;
            }

            let foto = "";
            let keterangan = "";

            if (status === 'Hadir') {
                foto = document.getElementById('foto-data').value;
                if (!foto) {
                    Swal.fire('Oops!', 'Jangan lupa jepret foto selfie kamu (Pastikan wajah & seragam jelas).', 'warning');
                    return;
                }
            } else if (status === 'Izin') {
                keterangan = document.getElementById('keterangan-izin').value.trim();
                if (keterangan.length < 5) {
                    Swal.fire('Oops!', 'Tuliskan alasan izin minimal 5 karakter huruf.', 'warning');
                    return;
                }
            }

            // Data final siap dikirim
            const payload = {
                waktu: new Date().toISOString(),
                hari: hari,
                mapel: mapel,
                nama: nama,
                status: status,
                foto: foto, 
                keterangan: keterangan
            };

            // SIMULASI SUKSES UI
            Swal.fire({
                title: 'Absen Terkirim! 🚀',
                text: `Data kehadiran ${nama} berhasil dicatat di sistem.`,
                icon: 'success',
                confirmButtonColor: '#00e5ff',
                background: '#fff'
            }).then(() => {
                // Simpan kunci di penyimpanan lokal browser agar tidak bisa dobel absen
                localStorage.setItem(cekAbsenKunci, 'true');
                window.location.reload();
            });
        }
    </script>
</body>
</html>
