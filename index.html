<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Kelas XIF7 Neon</title>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

        :root {
            /* Tema Neon on White */
            --bg-color: #ffffff;
            --card-bg: #ffffff;
            --text-main: #111111;
            --text-muted: #888888;
            --neon-cyan: #00f3ff;
            --neon-pink: #ff007a;
            --border-light: #eeeeee;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent; /* Hilangkan efek tap biru di HP */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Container Utama dengan efek glow neon super halus */
        .app-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 450px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0, 243, 255, 0.15), 0 -10px 40px rgba(255, 0, 122, 0.1);
            overflow: hidden;
            padding: 30px;
            position: relative;
            margin-top: 20px;
            border: 1px solid rgba(0, 243, 255, 0.2);
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-light);
            position: relative;
        }

        h1 { 
            font-size: 26px; 
            font-weight: 700;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }
        
        .clock { 
            font-size: 16px; 
            font-weight: 600; 
            color: var(--text-muted); 
            margin-top: 5px;
        }

        /* Transisi Panel yang sangat Smooth */
        .panel { 
            display: none; 
            opacity: 0;
            transform: scale(0.95) translateY(15px);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .panel.active { 
            display: block; 
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        h2 { font-size: 20px; margin-bottom: 5px; text-align: center; font-weight: 600;}
        p { text-align: center; color: var(--text-muted); font-size: 14px; margin-bottom: 25px; }

        /* Tombol Mulus & Glow */
        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 15px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        button:active { transform: scale(0.96); }

        .btn-primary { 
            background: linear-gradient(45deg, var(--neon-cyan), #0088ff); 
            color: white; 
            box-shadow: 0 8px 20px rgba(0, 243, 255, 0.3); 
        }
        .btn-primary:hover { box-shadow: 0 8px 25px rgba(0, 243, 255, 0.5); }

        .btn-secondary { 
            background: #fff; 
            color: var(--text-main); 
            border: 2px solid var(--border-light);
        }
        .btn-secondary:hover { border-color: var(--neon-pink); color: var(--neon-pink); }
        
        .btn-text { background: transparent; color: var(--text-muted); padding: 5px; margin-top: -5px; font-size: 14px; box-shadow: none;}
        .btn-text:hover { color: var(--text-main); }

        /* Form Inputs */
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: #555;}

        .input-field {
            width: 100%;
            padding: 14px;
            border: 2px solid var(--border-light);
            background: #fcfcfc;
            border-radius: 12px;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }
        .input-field:focus { 
            border-color: var(--neon-cyan); 
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
            background: #fff;
        }

        /* Custom Dropdown Triggers */
        .custom-select-btn {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 14px;
            border: 2px solid var(--border-light);
            background: #fcfcfc;
            border-radius: 12px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--text-muted);
        }
        .custom-select-btn:active { transform: scale(0.98); border-color: var(--neon-pink); }
        .custom-select-btn.selected { color: var(--text-main); font-weight: 600; border-color: var(--neon-cyan); }

        /* Pencarian dan List Nama */
        .search-box { margin-bottom: 10px; }
        .name-list {
            max-height: 180px;
            overflow-y: auto;
            border: 1px solid var(--border-light);
            border-radius: 12px;
            background: #fff;
            scroll-behavior: smooth;
        }
        
        /* Custom Scrollbar */
        .name-list::-webkit-scrollbar { width: 6px; }
        .name-list::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 10px; }
        
        .name-item {
            padding: 12px 15px;
            cursor: pointer;
            border-bottom: 1px solid var(--border-light);
            font-size: 14px;
            transition: all 0.2s ease;
            position: relative;
        }
        .name-item:last-child { border-bottom: none; }
        .name-item:hover { background: rgba(0, 243, 255, 0.05); }
        
        /* Highlight Nama Terpilih (Garis Neon) */
        .name-item.terpilih {
            background: rgba(0, 243, 255, 0.1);
            color: var(--text-main);
            font-weight: 700;
            padding-left: 20px;
        }
        .name-item.terpilih::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--neon-cyan);
            border-top-right-radius: 4px;
            border-bottom-right-radius: 4px;
            box-shadow: 0 0 10px var(--neon-cyan);
        }

        /* Radio Buttons Status */
        .radio-group { display: flex; gap: 15px; }
        .radio-btn { 
            flex: 1; text-align: center; padding: 12px; 
            border: 2px solid var(--border-light); 
            border-radius: 12px; cursor: pointer; 
            transition: all 0.3s ease;
            font-weight: 600;
            font-size: 14px;
            position: relative;
            overflow: hidden;
        }
        .radio-btn input { display: none; } /* Sembunyikan bulatannya */
        .radio-btn.active-hadir { border-color: var(--neon-cyan); background: rgba(0, 243, 255, 0.1); box-shadow: 0 0 15px rgba(0,243,255,0.2);}
        .radio-btn.active-izin { border-color: var(--neon-pink); background: rgba(255, 0, 122, 0.1); box-shadow: 0 0 15px rgba(255,0,122,0.2);}

        /* Kamera Area dengan Animasi Smooth */
        #area-dinamis { transition: all 0.4s ease; overflow: hidden; }
        .camera-wrapper {
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            background: #000;
            margin-bottom: 15px;
            position: relative;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        #video-kamera, #canvas-kamera { width: 100%; display: block; border-radius: 16px; }
        #video-kamera { transform: scaleX(1); } /* Tetap tidak mirror */
        
        .hidden { display: none !important; }

        /* ================= POP-UP MODAL PANEL (BOTTOM SHEET) ================= */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            display: flex; justify-content: center; align-items: flex-end; /* Muncul dari bawah */
            opacity: 0; visibility: hidden;
            transition: all 0.3s ease;
            z-index: 1000;
        }
        .modal-overlay.show { opacity: 1; visibility: visible; }
        
        .modal-content {
            background: var(--bg-color);
            width: 100%; max-width: 450px;
            border-top-left-radius: 24px; border-top-right-radius: 24px;
            padding: 25px;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 -10px 40px rgba(0, 243, 255, 0.1);
            max-height: 80vh; overflow-y: auto;
        }
        .modal-overlay.show .modal-content { transform: translateY(0); }

        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;}
        .modal-header h3 { font-size: 18px; font-weight: 600; }
        .close-btn { background: #f0f0f0; width: 35px; height: 35px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; padding: 0; margin: 0; color: #555;}
        
        .modal-item {
            padding: 15px;
            border: 2px solid var(--border-light);
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            text-align: center;
        }
        .modal-item:active { transform: scale(0.97); }
        .modal-item:hover { border-color: var(--neon-cyan); background: rgba(0,243,255,0.05); }

    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <h1>XIF7 ABSENTIA</h1>
            <div id="live-clock" class="clock">00:00:00</div>
        </header>

        <div id="panel-awal" class="panel active">
            <h2>Portal Kehadiran</h2>
            <p>Sistem Absensi Real-time Interaktif</p>
            <button class="btn-primary" onclick="switchPanel('panel-absen')">📝 ABSEN SEKARANG</button>
            <button class="btn-secondary" onclick="switchPanel('panel-pengelola')">⚙️ PENGELOLA (ADMIN)</button>
        </div>

        <div id="panel-pengelola" class="panel">
            <h2>Akses Admin</h2>
            <p>Khusus pengelola absensi</p>
            <input type="text" placeholder="Username" class="input-field" style="margin-bottom: 15px;">
            <input type="password" placeholder="Password" class="input-field" style="margin-bottom: 20px;">
            <button class="btn-primary" onclick="Swal.fire('Restricted', 'Panel Admin belum terhubung ke database.', 'info')">LOGIN</button>
            <button class="btn-text" onclick="switchPanel('panel-awal')">Kembali</button>
        </div>

        <div id="panel-absen" class="panel">
            <h2>Formulir Siswa</h2>
            
            <div class="form-group">
                <label>Pilih Jadwal:</label>
                <input type="hidden" id="hari" value="">
                <div class="custom-select-btn" id="btn-pilih-hari" onclick="openModal('modal-hari')">
                    <span id="teks-hari">Pilih Hari...</span> <span>▼</span>
                </div>
            </div>

            <div class="form-group">
                <input type="hidden" id="mapel" value="">
                <div class="custom-select-btn" id="btn-pilih-mapel" onclick="bukaModalMapel()">
                    <span id="teks-mapel">Pilih Mata Pelajaran...</span> <span>▼</span>
                </div>
            </div>

            <div class="form-group">
                <label>Identitas Siswa:</label>
                <input type="text" id="search-nama" class="input-field search-box" placeholder="🔍 Ketik nama kamu..." oninput="filterNama()">
                <div id="list-nama" class="name-list"></div>
                <input type="hidden" id="nama-terpilih" value="">
            </div>

            <div class="form-group">
                <label>Kehadiran:</label>
                <div class="radio-group">
                    <label class="radio-btn" id="label-hadir">
                        <input type="radio" name="status" value="Hadir" onchange="ubahStatus('Hadir')"> HADIR
                    </label>
                    <label class="radio-btn" id="label-izin">
                        <input type="radio" name="status" value="Izin" onchange="ubahStatus('Izin')"> IZIN
                    </label>
                </div>
            </div>

            <div id="area-dinamis" class="hidden">
                <div id="area-kamera" class="hidden">
                    <label>Verifikasi Wajah (Selfie):</label>
                    <div class="camera-wrapper">
                        <video id="video-kamera" autoplay playsinline></video>
                        <canvas id="canvas-kamera" class="hidden"></canvas>
                    </div>
                    <button class="btn-primary" id="btn-capture" onclick="takeSnapshot()">📸 Ambil Foto</button>
                    <button class="btn-secondary hidden" id="btn-retake" onclick="retakePhoto()">🔄 Foto Ulang</button>
                    <input type="hidden" id="foto-data" value="">
                </div>

                <div id="area-izin" class="hidden">
                    <label>Alasan Izin:</label>
                    <textarea id="keterangan-izin" class="input-field" rows="3" placeholder="Jelaskan alasan izin minimal 5 huruf..."></textarea>
                </div>
            </div>

            <br>
            <button class="btn-primary" onclick="kirimAbsen()" style="box-shadow: 0 8px 25px rgba(255,0,122,0.4); background: linear-gradient(45deg, var(--neon-pink), #ff5e00);">🚀 KIRIM DATA ABSEN</button>
            <button class="btn-text" onclick="switchPanel('panel-awal')">Batalkan</button>
        </div>
    </div>

    <div id="modal-hari" class="modal-overlay" onclick="closeModal('modal-hari')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3>Pilih Hari</h3>
                <button class="close-btn" onclick="closeModal('modal-hari')">✕</button>
            </div>
            <div id="list-hari-container">
                <div class="modal-item" onclick="pilihHari('Senin')">Senin</div>
                <div class="modal-item" onclick="pilihHari('Selasa')">Selasa</div>
                <div class="modal-item" onclick="pilihHari('Rabu')">Rabu</div>
                <div class="modal-item" onclick="pilihHari('Kamis')">Kamis</div>
                <div class="modal-item" onclick="pilihHari('Jumat')">Jumat</div>
            </div>
        </div>
    </div>

    <div id="modal-mapel" class="modal-overlay" onclick="closeModal('modal-mapel')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3>Pilih Mata Pelajaran</h3>
                <button class="close-btn" onclick="closeModal('modal-mapel')">✕</button>
            </div>
            <div id="list-mapel-container">
                </div>
        </div>
    </div>

    <script>
        // --- 1. DATA JADWAL & NAMA ---
        const jadwalPelajaran = {
            "Senin": ["PKWU (07.10 - 08.30)", "BIOLOGI (08.30 - 09.50)", "BAHASA SUNDA (10.10 - 11.30)", "MATEMATIKA (11.30 - 13.40)", "BAHASA INDONESIA (13.40 - 15.00)"],
            "Selasa": ["SEJARAH (06.30 - 08.00)", "PJOK (08.00 - 10.30)", "EKONOMI (10.30 - 13.30)", "MATEMATIKA (13.30 - 15.00)"],
            "Rabu": ["SENI BUDAYA (06.30 - 08.00)", "FISIKA (08.00 - 09.30)", "BAHASA INGGRIS (09.45 - 12.00)", "INFORMATIKA (12.45 - 15.00)"],
            "Kamis": ["BIOLOGI (07.10 - 09.10)", "PKN (09.10 - 10.50)", "BAHASA INDONESIA (10.50 - 12.10)", "PAI (13.00 - 15.00)"],
            "Jumat": ["INFORMATIKA (06.45 - 08.05)", "EKONOMI (08.05 - 09.25)", "FISIKA (09.45 - 11.50)"]
        };

        const daftarNama = [
            "AHMAD EKA R", "AISY HALAWAH", "ALYA ZALIANTI Z", "ANI MULYANI", "ANISA NUR A", 
            "DENNIS SEPTIANO", "DITA BELLA A", "EZRA FAIQ", "HABLY ALFATIHIN", "IFTITA ARIQOH", 
            "IIM QORIMAH", "JA'FAR SODIQ", "KAMILAH NURIL HS", "KESYA EKA ASTALITA", "KEYLA EDDYA W", 
            "MARWAH", "MUHAMMAD LUTHFI", "MUH RIZKY N", "MYISHA FARRAS A", "NABIL DARUL FARIS", 
            "NANANG SUMANTRI", "NAZWA AULIA", "NURUL FATIN A", "NURUL FIKRIYAH ZAK", "PUTRA DANU W", 
            "QUINAISHA LAILA K", "REVAND Z LP", "SATRIO NADA", "SELPIA NOVITA SARI", "SITI MAESAROH", 
            "SITI NURI MAULIDYA", "SURYA AJI SAPUTRA", "SYAFIRA SULISTIANTI", "SYAHLAA BAITI", 
            "TRI SETYO NINGRUM", "ULVIANA K", "ZELKHA SAID", "NUR HAFIZHOH"
        ];

        let stateNamaTerpilih = "";

        // --- 2. FITUR JAM & TRANSISI PANEL ---
        setInterval(() => {
            document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('id-ID');
        }, 1000);

        function switchPanel(panelId) {
            // Animasi tutup panel saat ini, baru buka yang baru
            const currentActive = document.querySelector('.panel.active');
            if(currentActive) {
                currentActive.style.opacity = 0;
                currentActive.style.transform = 'scale(0.95) translateY(15px)';
                setTimeout(() => {
                    currentActive.classList.remove('active');
                    const nextPanel = document.getElementById(panelId);
                    nextPanel.classList.add('active');
                    // Paksa reflow agar transisi CSS berjalan
                    void nextPanel.offsetWidth;
                    nextPanel.style.opacity = 1;
                    nextPanel.style.transform = 'scale(1) translateY(0)';
                }, 300); // Sinkron dengan durasi CSS
            }
            if(panelId === 'panel-awal') matikanKamera(); 
        }

        // --- 3. LOGIKA CUSTOM MODAL (HARI & MAPEL) ---
        function openModal(id) { document.getElementById(id).classList.add('show'); }
        function closeModal(id) { document.getElementById(id).classList.remove('show'); }

        function pilihHari(hari) {
            document.getElementById('hari').value = hari;
            const btnHari = document.getElementById('btn-pilih-hari');
            document.getElementById('teks-hari').innerText = hari;
            btnHari.classList.add('selected');
            
            // Reset Mapel jika ganti hari
            document.getElementById('mapel').value = "";
            document.getElementById('teks-mapel').innerText = "Pilih Mata Pelajaran...";
            document.getElementById('btn-pilih-mapel').classList.remove('selected');

            closeModal('modal-hari');
            generateListMapel(hari);
        }

        function bukaModalMapel() {
            const hari = document.getElementById('hari').value;
            if(!hari) {
                Swal.fire({icon: 'warning', title: 'Oops', text: 'Pilih hari terlebih dahulu!', confirmButtonColor: '#00f3ff'});
                return;
            }
            openModal('modal-mapel');
        }

        function generateListMapel(hari) {
            const container = document.getElementById('list-mapel-container');
            container.innerHTML = "";
            if(jadwalPelajaran[hari]) {
                jadwalPelajaran[hari].forEach(mapel => {
                    let div = document.createElement('div');
                    div.className = 'modal-item';
                    div.innerText = mapel;
                    div.onclick = () => pilihMapel(mapel);
                    container.appendChild(div);
                });
            }
        }

        function pilihMapel(mapel) {
            document.getElementById('mapel').value = mapel;
            document.getElementById('teks-mapel').innerText = mapel;
            document.getElementById('btn-pilih-mapel').classList.add('selected');
            closeModal('modal-mapel');
        }

        // --- 4. RENDER NAMA & HIGHLIGHT NEON ---
        const listContainer = document.getElementById('list-nama');
        function renderNama(filterText = "") {
            listContainer.innerHTML = "";
            const filtered = daftarNama.filter(nama => nama.toLowerCase().includes(filterText.toLowerCase()));
            
            filtered.forEach(nama => {
                let div = document.createElement('div');
                div.className = 'name-item';
                div.innerText = nama;
                
                // Jika nama ini yang dipilih, beri class 'terpilih'
                if(nama === stateNamaTerpilih) {
                    div.classList.add('terpilih');
                }

                div.onclick = () => {
                    stateNamaTerpilih = nama;
                    document.getElementById('nama-terpilih').value = nama;
                    // Render ulang untuk memindahkan garis neon (highlight)
                    renderNama(document.getElementById('search-nama').value);
                };
                listContainer.appendChild(div);
            });
        }
        renderNama(); // Load awal

        function filterNama() {
            const text = document.getElementById('search-nama').value;
            renderNama(text);
        }

        // --- 5. LOGIKA UI STATUS & KAMERA ---
        let streamKamera = null;

        function ubahStatus(status) {
            const areaDinamis = document.getElementById('area-dinamis');
            const areaKamera = document.getElementById('area-kamera');
            const areaIzin = document.getElementById('area-izin');
            const labelHadir = document.getElementById('label-hadir');
            const labelIzin = document.getElementById('label-izin');

            // Reset UI Radio Button
            labelHadir.classList.remove('active-hadir');
            labelIzin.classList.remove('active-izin');

            areaDinamis.classList.remove('hidden');

            if (status === 'Hadir') {
                labelHadir.classList.add('active-hadir');
                
                // Transisi Smooth antar area
                areaIzin.classList.add('hidden');
                areaKamera.classList.remove('hidden');
                mulaiKamera();
            } else {
                labelIzin.classList.add('active-izin');
                
                areaKamera.classList.add('hidden');
                areaIzin.classList.remove('hidden');
                matikanKamera();
            }
        }

        async function mulaiKamera() {
            const video = document.getElementById('video-kamera');
            try {
                streamKamera = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = streamKamera;
                document.getElementById('video-kamera').classList.remove('hidden');
                document.getElementById('canvas-kamera').classList.add('hidden');
                document.getElementById('btn-capture').classList.remove('hidden');
                document.getElementById('btn-retake').classList.add('hidden');
            } catch (err) {
                Swal.fire('Error', 'Izin kamera ditolak atau perangkat tidak memiliki kamera.', 'error');
            }
        }

        function matikanKamera() {
            if (streamKamera) {
                streamKamera.getTracks().forEach(track => track.stop());
            }
        }

        function takeSnapshot() {
            const video = document.getElementById('video-kamera');
            const canvas = document.getElementById('canvas-kamera');
            const context = canvas.getContext('2d');
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            document.getElementById('foto-data').value = canvas.toDataURL('image/png');
            
            video.classList.add('hidden');
            canvas.classList.remove('hidden');
            document.getElementById('btn-capture').classList.add('hidden');
            document.getElementById('btn-retake').classList.remove('hidden');
        }

        function retakePhoto() {
            document.getElementById('foto-data').value = "";
            document.getElementById('video-kamera').classList.remove('hidden');
            document.getElementById('canvas-kamera').classList.add('hidden');
            document.getElementById('btn-capture').classList.remove('hidden');
            document.getElementById('btn-retake').classList.add('hidden');
        }

        // --- 6. VALIDASI & PENGIRIMAN ---
        function kirimAbsen() {
            const hari = document.getElementById('hari').value;
            const mapel = document.getElementById('mapel').value;
            const nama = document.getElementById('nama-terpilih').value;
            const statusEl = document.querySelector('input[name="status"]:checked');
            const status = statusEl ? statusEl.value : null;

            if (!hari || !mapel || !nama || !status) {
                Swal.fire({
                    title: 'Data Belum Lengkap',
                    text: 'Pastikan Hari, Mapel, Nama, dan Kehadiran telah diisi.',
                    icon: 'warning',
                    confirmButtonColor: '#ff007a'
                });
                return;
            }

            let foto = "";
            let keterangan = "";

            if (status === 'Hadir') {
                foto = document.getElementById('foto-data').value;
                if (!foto) {
                    Swal.fire('Oops!', 'Jangan lupa jepret foto selfie kamu.', 'warning');
                    return;
                }
            } else if (status === 'Izin') {
                keterangan = document.getElementById('keterangan-izin').value.trim();
                if (keterangan.length < 5) {
                    Swal.fire('Oops!', 'Tuliskan alasan izin minimal 5 huruf.', 'warning');
                    return;
                }
            }

            const payload = {
                waktu: new Date().toISOString(),
                hari: hari,
                mapel: mapel,
                nama: nama,
                status: status,
                foto: foto, 
                keterangan: keterangan
            };

            // Uncomment baris di bawah saat menyambungkan ke Firebase Asli
            /*
            firebase.database().ref('absensi_xif7').push(payload)
            .then(() => {
                Swal.fire('Sukses', 'Absen terkirim!', 'success').then(() => window.location.reload());
            })
            .catch((error) => Swal.fire('Error', error, 'error'));
            */

            // Simulasi Sukses UI
            Swal.fire({
                title: 'Absen Terkirim! 🚀',
                text: `Data kehadiran ${nama} berhasil dicatat.`,
                icon: 'success',
                confirmButtonColor: '#00f3ff',
                background: '#fff'
            }).then(() => {
                window.location.reload();
            });
        }
    </script>
</body>
</html>
